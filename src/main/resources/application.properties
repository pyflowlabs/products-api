spring.application.name=products-api

# H2 in-memory database. The data lives only while the app is running and is
# recreated (and re-seeded) on every restart.
spring.datasource.url=jdbc:h2:mem:products
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate build the schema from the Product entity.
spring.jpa.hibernate.ddl-auto=update

# Browse the database in a web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
